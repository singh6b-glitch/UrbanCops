<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="UrbanCops">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="application-name" content="UrbanCops">
    <meta name="theme-color" content="#060b14">
    <title>URBANCOPS APP - Accés</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg: #060b14;
            --panel: #ffffff;
            --panel-soft: #f6f8fb;
            --text: #0d172a;
            --muted: #69758a;
            --line: #e3e8f0;
            --red: #bd162c;
            --blue: #5392f9;
            --orange: #ff7a1a;
            --deep: #231227;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            background-color: #060b14;
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        .premium-bg-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
            background-color: #060b14;
        }

        .premium-bg-glow::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                linear-gradient(135deg, rgba(189, 22, 44, 0.22) 0%, rgba(6, 11, 20, 0) 36%),
                linear-gradient(215deg, rgba(83, 146, 249, 0.2) 0%, rgba(6, 11, 20, 0) 42%),
                repeating-linear-gradient(90deg, rgba(255,255,255,0.035) 0 1px, transparent 1px 72px);
        }

        .premium-bg-glow::after {
            content: '';
            position: absolute;
            inset: auto -10% 0 -10%;
            height: 34%;
            background: linear-gradient(0deg, rgba(255,122,26,0.12), rgba(6,11,20,0));
        }

        .app-viewport {
            position: relative;
            z-index: 2;
            display: flex;
            width: 200vw; 
            height: 100%;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            transform: translateX(0vw); 
        }

        .screen {
            width: 100vw;
            height: 100%;
            flex-shrink: 0;
            position: relative;
            display: grid;
            place-items: center;
            padding: 18px;
            overflow-y: auto;
        }

        .auth-shell {
            width: min(100%, 440px);
            min-height: min(760px, calc(100vh - 36px));
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 16px;
        }

        .brand-panel {
            color: #ffffff;
            padding: 24px 6px 8px;
        }

        .brand-row {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 14px;
        }

        .brand-logo {
            width: 58px;
            height: 58px;
            flex: 0 0 58px;
            border-radius: 16px;
            object-fit: cover;
            box-shadow: 0 16px 34px rgba(0,0,0,0.28);
        }

        .brand-name {
            font-size: 26px;
            font-weight: 300;
            letter-spacing: 0.22em;
            text-transform: uppercase;
        }

        .brand-kicker {
            margin-top: 22px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            color: #c8d6ed;
            background: rgba(255,255,255,0.075);
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 12px;
            font-weight: 700;
        }

        .form-header-area {
            position: relative;
            margin-top: 16px;
        }

        .back-btn {
            position: absolute;
            top: -66px;
            left: 0;
            width: 44px;
            height: 44px;
            border-radius: 14px;
            font-size: 18px;
            color: #ffffff;
            cursor: pointer;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.12);
        }

        .form-header-title {
            color: var(--text);
            font-size: 30px;
            font-weight: 900;
            line-height: 1.05;
            letter-spacing: 0;
        }

        .form-panel-white {
            background-color: var(--panel);
            border-radius: 28px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 22px;
            overflow-y: auto;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.34);
        }

        .form-fields-stack {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .input-group {
            position: relative;
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 12px 44px 12px 14px;
            background: var(--panel-soft);
        }

        .input-label {
            display: block;
            color: var(--red);
            font-size: 11px;
            font-weight: 800;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .input-field {
            width: 100%;
            border: none;
            background: none;
            outline: none;
            color: var(--text);
            font-size: 15px;
            font-weight: 650;
            padding-right: 0;
        }

        .input-field::placeholder {
            color: #9aa6b8;
        }

        .input-icon-right {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9aa6b8;
            font-size: 14px;
        }

        .forgot-password-link {
            display: block;
            text-align: right;
            color: var(--deep);
            font-size: 13px;
            text-decoration: none;
            margin-top: 2px;
            font-weight: 800;
        }

        .action-area-bottom {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            margin-top: 0;
        }

        .form-footer-hint {
            color: var(--muted);
            font-size: 13px;
            text-align: center;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 5px;
            padding-right: 0;
        }

        .footer-action-link {
            color: var(--red);
            text-decoration: none;
            font-weight: 900;
            cursor: pointer;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 18px; 
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            border: none;
            outline: none;
            transition: all 0.2s ease;
            text-align: center;
        }

        .btn-action-gradient {
            background: linear-gradient(135deg, var(--red) 0%, var(--deep) 62%, #15355f 100%);
            color: #ffffff;
            box-shadow: 0 14px 24px rgba(189, 22, 44, 0.25);
        }

        .auth-card-topline {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 4px;
        }

        .auth-chip {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 8px 10px;
            border-radius: 999px;
            background: #eef4ff;
            color: #2f6dcc;
            font-size: 11px;
            font-weight: 900;
            white-space: nowrap;
        }

        .btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        @media (min-width: 820px) {
            .auth-shell {
                width: min(920px, calc(100vw - 64px));
                min-height: 620px;
                display: grid;
                grid-template-columns: 1fr 430px;
                align-items: center;
            }

            .brand-panel {
                padding: 36px;
            }

            .brand-name {
                font-size: 30px;
            }

            .brand-logo {
                width: 64px;
                height: 64px;
                flex-basis: 64px;
            }

            .brand-panel .form-header-title {
                color: #ffffff;
            }

            .form-panel-white {
                max-height: calc(100vh - 80px);
            }
        }
    </style>
</head>
<body>

    <div class="premium-bg-glow"></div>

    <div id="app-viewport" class="app-viewport" style="display:none;">
        
        <div class="screen">
            <div class="auth-shell">
                <section class="brand-panel">
                    <div class="brand-row">
                        <img class="brand-logo" src="assets/urbancops-logo.png" alt="UrbanCops">
                        <div class="brand-name">UrbanCops</div>
                    </div>
                    <div class="brand-kicker"><i class="fas fa-user-shield"></i> Preparació Policia Local</div>
                </section>

                <div class="form-panel-white">
                    <div class="auth-card-topline">
                        <div class="form-header-area">
                            <h2 class="form-header-title">Hola<br>entra al teu compte</h2>
                        </div>
                        <div class="auth-chip"><i class="fas fa-lock"></i> Accés segur</div>
                    </div>
                    <form id="signin-form" class="form-fields-stack">
                        <div class="input-group">
                            <label class="input-label">Correu electrònic</label>
                            <input type="email" class="input-field" placeholder="nom@exemple.com" id="login-email" required autocomplete="username">
                            <i class="fas fa-envelope input-icon-right"></i>
                        </div>
                        <div class="input-group">
                            <label class="input-label">Contrasenya</label>
                            <input type="password" class="input-field" placeholder="••••••" id="login-pass" required autocomplete="current-password">
                            <i class="fas fa-eye-slash input-icon-right toggle-password"></i>
                        </div>
                        <a href="#" class="forgot-password-link">Has oblidat la contrasenya?</a>
                    </form>
                    
                    <div class="action-area-bottom">
                        <button type="submit" form="signin-form" class="btn btn-action-gradient">Entrar</button>
                        <div class="form-footer-hint">
                            Encara no tens compte? <span class="footer-action-link" onclick="slideTo(1)">Registra't</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="screen">
            <div class="auth-shell">
                <section class="brand-panel">
                    <div class="brand-row">
                        <img class="brand-logo" src="assets/urbancops-logo.png" alt="UrbanCops">
                        <div class="brand-name">UrbanCops</div>
                    </div>
                    <div class="brand-kicker"><i class="fas fa-id-card"></i> Alta d'alumne</div>
                </section>

                <div class="form-panel-white">
                    <div class="auth-card-topline">
                        <div class="form-header-area">
                            <button class="back-btn" onclick="slideTo(0)"><i class="fas fa-chevron-left"></i></button>
                            <h2 class="form-header-title">Crea el teu<br>compte</h2>
                        </div>
                        <div class="auth-chip"><i class="fas fa-user-plus"></i> Nou compte</div>
                    </div>
                    <form id="signup-form" class="form-fields-stack">
                        <div class="input-group">
                            <label class="input-label">Nom</label>
                            <input type="text" class="input-field" placeholder="Nom" id="reg-name" required autocomplete="given-name">
                            <i class="fas fa-user input-icon-right"></i>
                        </div>
                        <div class="input-group">
                            <label class="input-label">Cognoms</label>
                            <input type="text" class="input-field" placeholder="Cognoms" id="reg-surname" required autocomplete="family-name">
                            <i class="fas fa-users input-icon-right"></i>
                        </div>
                        <div class="input-group">
                            <label class="input-label">Correu electrònic</label>
                            <input type="email" class="input-field" placeholder="nom@exemple.com" id="reg-email" required autocomplete="email">
                            <i class="fas fa-envelope input-icon-right"></i>
                        </div>
                        <div class="input-group">
                            <label class="input-label">Telèfon de contacte</label>
                            <input type="tel" class="input-field" placeholder="600123456" id="reg-phone" required autocomplete="tel">
                            <i class="fas fa-phone input-icon-right"></i>
                        </div>
                        <div class="input-group">
                            <label class="input-label">Contrasenya</label>
                            <input type="password" class="input-field" placeholder="••••••" id="reg-pass" required autocomplete="new-password">
                            <i class="fas fa-eye-slash input-icon-right toggle-password"></i>
                        </div>
                    </form>
                    
                    <div class="action-area-bottom">
                        <button type="submit" form="signup-form" class="btn btn-action-gradient">Registrar-me</button>
                        <div class="form-footer-hint">
                            Ja tens compte? <span class="footer-action-link" onclick="slideTo(0)">Entrar</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, onAuthStateChanged, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCw7c46NXYpS4OF8_TGmBqyx0Q-mNP9J5Q",
            authDomain: "urbancopsapp.firebaseapp.com",
            projectId: "urbancopsapp",
            storageBucket: "urbancopsapp.firebasestorage.app",
            messagingSenderId: "519888517956",
            appId: "1:519888517956:web:cfcc7e2f3bbcc6fb09f511"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Si ya está logueado, directo a la app
        // Esperar a que Firebase compruebe la sesión
        onAuthStateChanged(auth, (user) => {

if (user) {
    window.location.replace("urbancopsapp.html");
} else {
    document.getElementById("app-viewport").style.display = "flex";
}

});

        window.slideTo = function(screenIndex) {
            document.getElementById('app-viewport').style.transform = `translateX(-${screenIndex * 100}vw)`;
        }

        async function enviarRecuperacioContrasenya() {
            const email = document.getElementById('login-email').value.trim();
            if (!email) {
                alert("Escriu el teu correu electrònic al camp d'accés i torna-ho a provar.");
                return;
            }

            try {
                await sendPasswordResetEmail(auth, email);
                alert("T'hem enviat un correu per restablir la contrasenya.");
            } catch (error) {
                console.error(error);
                alert("No s'ha pogut enviar el correu de recuperació. Revisa el correu introduït.");
            }
        }

        // Mostrar / Ocultar contraseñas
        document.querySelectorAll('.toggle-password').forEach(icon => {
            icon.addEventListener('click', function() {
                const input = this.parentElement.querySelector('input');
                if (input.type === 'password') {
                    input.type = 'text';
                    this.classList.replace('fa-eye-slash', 'fa-eye');
                } else {
                    input.type = 'password';
                    this.classList.replace('fa-eye', 'fa-eye-slash');
                }
            });
        });

        document.querySelectorAll('.forgot-password-link').forEach(link => {
            link.addEventListener('click', (event) => {
                event.preventDefault();
                enviarRecuperacioContrasenya();
            });
        });

        // CONTROL: Sign In
        document.getElementById('signin-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-pass').value;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.replace("urbancopsapp.html");
            } catch (error) {
                alert("No s'ha pogut iniciar sessió. Revisa el correu i la contrasenya.");
            }
        });

        // CONTROL: Sign Up Completo (Auth + Firestore)
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('reg-name').value.trim();
            const surname = document.getElementById('reg-surname').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const phone = document.getElementById('reg-phone').value.trim();
            const password = document.getElementById('reg-pass').value;
            const fullName = `${name} ${surname}`.trim();

            try {
                localStorage.setItem('urbancops_pending_profile', JSON.stringify({
                    nombre: name,
                    apellidos: surname,
                    correo: email,
                    telefono: phone
                }));

                // 1. Crear usuario en Auth
                const credential = await createUserWithEmailAndPassword(auth, email, password);
                
                localStorage.setItem('urbancops_pending_profile', JSON.stringify({
                    uid: credential.user.uid,
                    nombre: name,
                    apellidos: surname,
                    correo: email,
                    telefono: phone
                }));

                // 2. Guardar el pack completo de datos en Firestore en la colección 'usuarios'
                await setDoc(doc(db, "usuarios", credential.user.uid), {
                    nombre: name,
                    apellidos: surname,
                    nombreCompleto: fullName,
                    displayName: fullName,
                    correo: email,
                    email: email,
                    telefono: phone,
                    fechaRegistro: new Date().toISOString(),
                    xp: 0,
                    ratxa: 0,
                    ultimaFechaTest: "",
                    errores: [],
                    accesosModulos: {},
                    accesosModosPrueba: {},
                    usosModosPrueba: {
                        rapid: 0,
                        contrarellotge: 0,
                        sobrevivencia: 0,
                        doble: 0
                    }
                });

                // 3. Actualizar su display name básico para que Firebase lo reconozca rápido
                await updateProfile(credential.user, {
                    displayName: fullName
                }).catch((profileError) => {
                    console.warn("No se pudo guardar displayName en Auth:", profileError);
                });

                window.location.replace("urbancopsapp.html");
            } catch (error) {
                console.error(error);
                alert("No s'ha pogut registrar l'usuari. Revisa les dades i torna-ho a provar.");
            }
        });
    </script>
</body>
</html>
